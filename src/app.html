<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Brygada+1918:ital,wght@0,400..700;1,400..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
	<style>
		:root {
			--font-mono: 'IBM Plex Mono', monospace;
			--font-special: 'Brygada 1918', serif;
			--font-main: "Nunito Sans", serif;
			--color-highlight: #c0fff8;
		}
		body {
			margin: 0;
			padding: 16px;
		}

		* {
			color: #000;
			background-color: #fff;
		}
		@media (prefers-color-scheme: dark) {
			:root {
				--color-highlight: #c0fff8;
			}
			body {
				color: #fff;
				background-color: #222;
			}
			* {
				color: #fff;
				background-color: #222;
			}
		}
	</style>
</html>
